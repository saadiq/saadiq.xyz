name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify this is still the latest commit on main
        run: |
          git fetch origin main
          if [ "$GITHUB_SHA" != "$(git rev-parse origin/main)" ]; then
            echo "Newer commit exists on main — skipping deploy."
            exit 1
          fi

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bun run build

      - name: Deploy to droplet
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 167.71.169.225 >> ~/.ssh/known_hosts
          scp -r dist/* root@167.71.169.225:/var/www/saadiq.xyz/
